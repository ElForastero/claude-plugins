name: test-npc

on:
  push:
    branches: [main]
    paths:
      - "plugins/npc/**"
      - ".github/workflows/test-npc.yml"
  pull_request:
    branches: [main]
    paths:
      - "plugins/npc/**"
      - ".github/workflows/test-npc.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        working-directory: plugins/npc
        run: make test
